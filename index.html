<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipit AI Clone</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Pipit AI Clone</h1>

<div class="card">

<label>Upload Foto</label>
<input type="file" id="imageInput" accept="image/*">

<label>Upload Audio MP3</label>
<input type="file" id="audioInput" accept=".mp3,audio/*">

<label>Prompt Gerakan Video</label>
<textarea id="prompt"
placeholder="Contoh:
Orang bernyanyi sambil tersenyum dan menggerakkan kepala mengikuti musik"></textarea>

<label>Durasi Video</label>
<select id="duration">
<option value="10">10 Detik</option>
<option value="20">20 Detik</option>
<option value="30">30 Detik</option>
</select>

<button id="generateBtn">
Generate Video
</button>

<div id="loading">
Memproses Video...
</div>

<video
id="videoPreview"
controls
style="display:none;">
</video>

<a
id="downloadBtn"
style="display:none;"
download="video.mp4">
Download Video
</a>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
